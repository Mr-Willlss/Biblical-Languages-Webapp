

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In · Biblical Languages</title>
  <link rel="stylesheet" href="css/variables.css?v=20260710-login-fix">
  <link rel="stylesheet" href="css/base.css?v=20260710-login-fix">
  <link rel="stylesheet" href="css/components.css?v=20260710-mobile-admin">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/rtl.css">
</head>
<body class="auth-page">
  <main class="landing-hero">
    <section class="auth-card card">
      <div class="icon-row"><div class="brand-mark"><span data-lang-logo>Ω</span></div><div><h1>Welcome back</h1><p class="muted">Every word learned brings you closer to the original text.</p></div></div>
      <div class="tabs stage-space"><button class="tab-btn active" data-auth-tab="login" type="button" aria-label="Login tab">Login</button><button class="tab-btn" data-auth-tab="register" type="button" aria-label="Register tab">Register</button></div>
      <div id="auth-notice" class="auth-notice" role="alert" hidden></div>
      <form id="auth-form" class="form-grid stage-space" novalidate>
        <div class="field" data-field="email"><label for="email">Email</label><input id="email" name="email" type="email" aria-label="Email" required><span class="field-error"></span></div>
        <div class="field" data-field="password"><label for="password">Password</label><input id="password" name="password" type="password" aria-label="Password" required><span class="field-error"></span></div>
        <button class="btn btn-primary" type="submit" aria-label="Sign in">Sign In</button>
        <button class="btn btn-ghost" id="google-auth" type="button" aria-label="Continue with Google">Continue with Google</button>
      </form>
    </section>
  </main>
  <script src="vendor/lucide.min.js?v=20260703"></script>
  <script src="js/firebase-env.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/login-fallback.js?v=20260710-login-fix" defer></script>
  <script type="module" src="js/login.js?v=20260710-login-fix"></script>
</body>
</html>
