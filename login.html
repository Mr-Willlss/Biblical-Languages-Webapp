
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In · Biblical Languages</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/rtl.css">
</head>
<body class="auth-page">
  <main class="landing-hero">
    <section class="auth-card card">
      <div class="icon-row"><div class="brand-mark"><span data-lang-logo>Ω</span></div><div><h1>Welcome back</h1><p class="muted">Every word learned brings you closer to the original text.</p></div></div>
      <div class="tabs stage-space"><button class="tab-btn active" data-auth-tab="login" type="button" aria-label="Login tab">Login</button><button class="tab-btn" data-auth-tab="register" type="button" aria-label="Register tab">Register</button></div>
      <form id="auth-form" class="form-grid stage-space" novalidate></form>
    </section>
  </main>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
  // Biblical Languages Firebase configuration
  // Replace these placeholders with the Firebase Console web app credentials.
  window.BLQ_FIREBASE_CONFIG = {
    apiKey: "YOUR_ACTUAL_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
</script>
<script type="module" src="js/login.js"></script>
</body>
</html>
